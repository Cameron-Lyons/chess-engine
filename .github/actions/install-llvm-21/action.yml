name: Install LLVM 21
description: Install LLVM 21 toolchain packages from apt.llvm.org on Ubuntu 24.04

inputs:
  packages:
    description: Space-separated apt package names to install
    required: false
    default: clang-21 clang-format-21 clang-tidy-21

runs:
  using: composite
  steps:
    - shell: bash
      env:
        PACKAGES: ${{ inputs.packages }}
      run: |
        set -euo pipefail
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
        sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
        sudo apt-get update
        sudo apt-get install -y $PACKAGES
