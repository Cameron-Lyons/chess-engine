name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update
          sudo apt-get install -y clang-format-21
      - name: Check formatting
        run: ./scripts/check_clang_format.sh

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-tidy
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update
          sudo apt-get install -y clang-tidy-21
      - name: Run clang-tidy
        run: ./scripts/run_clang_tidy.sh

  build-and-test:
    name: Build & Test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - compiler: clang-21
            cc: clang-21
            cxx: clang++-21
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install Clang 21
        if: matrix.compiler == 'clang-21'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update
          sudo apt-get install -y clang-21

      - name: Mount bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-${{ matrix.compiler }}-${{ hashFiles('MODULE.bazel', 'BUILD.bazel', '.bazelrc') }}
          restore-keys: bazel-${{ matrix.compiler }}-

      - name: Build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          bazel build //:engine_cli //:engine_uci
          --jobs=$(nproc)
          --copt=-march=x86-64-v3
          --copt=-mavx2

      - name: Test
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          bazel test //tests/...
          --jobs=$(nproc)
          --config=release
          --copt=-march=x86-64-v3
          --copt=-mavx2
          --test_output=errors

  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Install dead code dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y universal-ctags ripgrep g++-14
      - name: Run dead code checks
        env:
          CC: gcc-14
          CXX: g++-14
        run: ./scripts/check_dead_code.sh
