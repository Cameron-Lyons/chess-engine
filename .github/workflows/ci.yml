name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        uses: ./.github/actions/install-llvm-21
        with:
          packages: clang-format-21
      - name: Check formatting
        run: ./scripts/check_clang_format.sh

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Install clang-tidy
        uses: ./.github/actions/install-llvm-21
        with:
          packages: clang-21 clang-tidy-21
      - name: Mount bazel cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-clang-tidy-${{ hashFiles('MODULE.bazel', 'BUILD.bazel', '.bazelrc', 'tests/BUILD.bazel') }}
          restore-keys: bazel-clang-tidy-
      - name: Run clang-tidy
        env:
          CC: clang-21
          CXX: clang++-21
          CLANG_TIDY_PATHS: src,tests
        run: ./scripts/run_clang_tidy.sh

  build-and-test:
    name: Build & Test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - compiler: clang-21
            cc: clang-21
            cxx: clang++-21
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install Clang 21
        if: matrix.compiler == 'clang-21'
        uses: ./.github/actions/install-llvm-21
        with:
          packages: clang-21

      - name: Mount bazel cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-${{ matrix.compiler }}-${{ hashFiles('MODULE.bazel', 'BUILD.bazel', '.bazelrc', 'tests/BUILD.bazel') }}
          restore-keys: bazel-${{ matrix.compiler }}-

      - name: Build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          bazel build //:engine_cli //:engine_uci
          --jobs=$(nproc)
          --config=ci

      - name: Test
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          bazel test //tests/...
          --jobs=$(nproc)
          --config=release
          --config=ci
          --test_output=errors

  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Install dead code dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y universal-ctags ripgrep g++-14
      - name: Mount bazel cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-dead-code-${{ hashFiles('MODULE.bazel', 'BUILD.bazel', '.bazelrc', 'tests/BUILD.bazel') }}
          restore-keys: bazel-dead-code-
      - name: Run dead code checks
        env:
          CC: gcc-14
          CXX: g++-14
        run: ./scripts/check_dead_code.sh

  sanitizer:
    name: Sanitizer (ASan+UBSan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Install Clang 21
        uses: ./.github/actions/install-llvm-21
        with:
          packages: clang-21
      - name: Mount bazel cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-sanitize-${{ hashFiles('MODULE.bazel', 'BUILD.bazel', '.bazelrc', 'tests/BUILD.bazel') }}
          restore-keys: bazel-sanitize-
      - name: Test with ASan+UBSan
        env:
          CC: clang-21
          CXX: clang++-21
        run: >
          bazel test //tests/...
          --test_tag_filters=-noasan
          --jobs=$(nproc)
          --config=ci
          --config=sanitize
          --test_output=errors

